<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SIGR - Sabor & Mesa: sistema integral de gestión de restaurante.">
  <title>Sabor &amp; Mesa — SIGR</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/modules.css">
</head>
<body>
  <!-- Pantalla de login (visible mientras no hay sesión) -->
  <section id="pantalla-login" class="pantalla-login" aria-hidden="false">
    <div class="login-card">
      <header class="login-header">
        <img src="assets/logo.svg" alt="Logotipo Sabor &amp; Mesa" width="64" height="64">
        <h1 id="login-titulo">Sabor &amp; Mesa</h1>
        <p id="login-subtitulo">Sistema Integral de Gestión de Restaurante</p>
      </header>

      <form id="form-login" class="formulario" novalidate>
        <label id="lbl-login-usuario" for="login-usuario">Correo electrónico</label>
        <input type="email" id="login-usuario" name="email" autocomplete="email"
               placeholder="usuario@empresa.com" required>

        <label id="lbl-login-clave" for="login-clave">Contraseña</label>
        <input type="password" id="login-clave" name="clave" autocomplete="current-password" required>

        <button type="submit" id="btn-login" class="boton boton-primario">Ingresar</button>

        <p id="login-error" class="mensaje-error" role="alert" hidden></p>
      </form>
    </div>
  </section>

  <!-- Shell de la aplicación (visible cuando hay sesión) -->
  <div id="app-shell" class="app-shell" hidden>
    <header class="app-header">
      <div class="app-header-izq">
        <button id="btn-menu-toggle" class="boton-icono" aria-label="Mostrar u ocultar el menú">☰</button>
        <img src="assets/logo.svg" alt="" width="32" height="32">
        <h1 id="app-titulo" class="app-titulo">Sabor &amp; Mesa</h1>
      </div>
      <div class="app-header-der">
        <div id="selector-idioma" class="selector-idioma" aria-label="Idioma"></div>
        <span id="info-usuario" class="info-usuario"></span>
        <button id="btn-salir" class="boton boton-secundario">Cerrar sesión</button>
      </div>
    </header>

    <div class="app-cuerpo">
      <nav id="barra-lateral" class="barra-lateral" aria-label="Navegación principal">
        <ul id="lista-modulos"></ul>
      </nav>
      <main id="contenedor-modulo" class="contenedor-modulo" tabindex="-1">
        <!-- Cada módulo pinta su contenido aquí -->
      </main>
    </div>
  </div>

  <!-- Contenedor de notificaciones tipo toast -->
  <div id="contenedor-toasts" class="contenedor-toasts" aria-live="polite"></div>

  <!-- Contenedor de modales -->
  <div id="contenedor-modal" class="contenedor-modal" hidden></div>

  <!-- Scripts: núcleo primero (orden importa), luego módulos -->
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/pedidos.js"></script>
  <script src="js/reservas.js"></script>
  <script src="js/clientes.js"></script>
  <script src="js/facturacion.js"></script>
  <script src="js/reportes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
